name: Job Scraper Bot

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp gspread feedparser google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client beautifulsoup4 ddgs

      - name: Run Job Scraper
        env:
          GOOGLE_SHEET_CREDS: ${{ secrets.GOOGLE_SHEET_CREDS }}
          SAPI: ${{ secrets.SAPI }}
          CXAPI: ${{ secrets.CXAPI }}
          GAPI1: ${{ secrets.GAPI1 }}
          GAPI2: ${{ secrets.GAPI2 }}
          GAPI3: ${{ secrets.GAPI3 }}
          GAPI4: ${{ secrets.GAPI4 }}
          GAPI5: ${{ secrets.GAPI5 }}
          GAPI6: ${{ secrets.GAPI6 }}
          TOK: ${{ secrets.TOK }}
          ID: ${{ secrets.ID }}
          USER_PROFILE_INFO: ${{ secrets.USER_PROFILE_INFO }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python main.py
