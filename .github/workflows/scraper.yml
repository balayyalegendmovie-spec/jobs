name: Job Scraper Bot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp gspread feedparser google-auth google-api-python-client beautifulsoup4 ddgs

      - name: Run Bot
        env:
          GOOGLE_SHEET_CREDS: ${{ secrets.GOOGLE_SHEET_CREDS }}
          SAPI: ${{ secrets.SAPI }}
          CXAPI: ${{ secrets.CXAPI }}
          TOK: ${{ secrets.TOK }}
          ID: ${{ secrets.ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
        run: python main.py
